name: personal-website-contact
runtime: yaml
description: Deploys the contact infra

variables:
  location: europe-west1
  repositoryId: personal-website

resources:

  ########################################
  # contact-service
  ########################################

  # Manages the binary.
  contact-service-binary:
    type: docker:Image
    properties:
      build:
        args:
          PORT: "8080"
        platform: linux/amd64
        context: ../service/build/dist/js
      imageName: ${location}-docker.pkg.dev/${gcp:project}/${repositoryId}/contact-service:latest
      registry:
        server: ${location}-docker.pkg.dev
        username: _json_key
        password:
          fn::secret:
            fn::readFile: ${gcp:credentials}
    options:
      protect: true
  # Manages the Cloud Run service.
  contact-service:
    type: gcp:cloudrunv2:Service
    properties:
      ingress: INGRESS_TRAFFIC_ALL
      location: ${location}
      name: contact-service
      template:
        containers:
          - image: ${contact-service-binary.repoDigest}
            ports:
              containerPort: 8080
              name: http1
            resources:
              cpuIdle: true
              limits:
                cpu: 1000m
                memory: 512Mi
            startupProbe:
              failureThreshold: 1
              periodSeconds: 240
              tcpSocket:
                port: 8080
              timeoutSeconds: 240
        maxInstanceRequestConcurrency: 80
        scaling:
          maxInstanceCount: 100
          minInstanceCount: 0
        timeout: 300s
      traffics:
        - percent: 100
          type: TRAFFIC_TARGET_ALLOCATION_TYPE_LATEST
    options:
      version: 8.6.0
      protect: true
  # Manages the Cloud Run service policy.
  contact-service-policy:
    type: gcp:cloudrunv2:ServiceIamPolicy
    properties:
      name: ${contact-service.name}
      location: ${location}
      policyData: |
        {
          "bindings": [
            {
              "role": "roles/run.invoker",
              "members": [
                "allUsers"
              ]
            }
          ]
        }
    options:
      version: 8.6.0
      protect: true

outputs:
  contactServiceHost: ${contact-service.uri}
